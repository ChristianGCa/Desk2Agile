#  ChamaTaiga — defaults embutidos (não edite para deploys)
#  Para customizar, edite config/application.yaml no host.

server:
  port: 8081

taiga:
  api:
    url: ${TAIGA_URL}
    username: ${TAIGA_USERNAME}
    password: ${TAIGA_PASSWORD}
  web:
    url: ${TAIGA_WEB_URL}
  routing:
    fallback-project-name: Diversos
    entity-mappings: []

glpi:
  api:
    url: ${GLPI_URL}
    app-token: ${GLPI_APP_TOKEN}
    user-token: ${GLPI_USER_TOKEN}
    category-that-send-to-taiga:
    assignee-that-send-to-taiga:

  plugin-fields:
    private-ticket-status-block-name: Informações do Taiga
    public-ticket-status-block-name: Progresso do Chamado
    status-inicial: Novo
    private-fields:
      id-taiga: ID Taiga
      link-taiga: Link Taiga
    public-fields:
      status-chamado: Status do chamado
      data-prevista: Data prevista

  # status-map intencionalmente vazio. Defaults estão em StatusTranslator.java.
  status-map: []

  entities:
    root-name: Entidade raiz

security:
  webhook:
    allowed-ips:
      - "*"
    glpi-token: ${WEBHOOK_GLPI_TOKEN:}
    taiga-secret: ${WEBHOOK_TAIGA_SECRET:}

ssl:
  skip-verify: ${SSL_SKIP_VERIFY:false}

integration:
  auth:
    max-retries: 1
  async:
    core-pool-size: 2
    max-pool-size: 5
    queue-capacity: 100
    shutdown-timeout: 30

logging:
  level:
    com.chris.glpi_taiga_integration: INFO
