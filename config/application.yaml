#  Configuração por ambiente

#  Monte este arquivo em ./config/application.yaml no host.
#  Só declare aqui o que difere dos defaults embutidos.

taiga:
  routing:
    # Projeto Taiga de destino quando nenhum mapeamento bater
    fallback-project-name: Diversos

    # Mapeamento: entidade do GLPI - projeto Taiga
    # Use os nomes exatos como aparecem nas duas ferramentas
    entity-mappings:
      - glpi-entity-name: Projeto 1
        taiga-project-name: Primeiro Serviço
      - glpi-entity-name: Diversos
        taiga-project-name: Diversos

glpi:
  api:
    # Categoria que dispara criação de issue no Taiga ("*" = qualquer, vazio = desligado)
    category-that-send-to-taiga: Desenvolvimento
    # Usuário atribuído que dispara criação de issue ("*" = qualquer, vazio = desligado)
    assignee-that-send-to-taiga: tech

  plugin-fields:
    # Nomes dos blocos do plugin Fields. Coloque exatamente como estão no GLPI
    private-ticket-status-block-name: Informações do Taiga
    public-ticket-status-block-name: Progresso do chamado

  # Descomente e ajuste SOMENTE se seus nomes de campos no plugin Fields
  # forem diferentes dos defaults abaixo:
  #    private-fields:
  #      id-taiga: ID Taiga
  #      link-taiga: Link Taiga
  #    public-fields:
  #      status-chamado: Status do Chamado
  #      data-prevista: Data prevista

  # Descomente para sobrescrever traduções de status ou adicionar status customizados.
  # Os status padrão do Taiga já estão traduzidos - só declare o que quiser mudar.
  # status-map:
  #   - taiga: In progress
  #     glpi: Em desenvolvimento   # sobrescreve o default "Em andamento"
  #   - taiga: MeuStatusCustom
  #     glpi: Texto no GLPI

  entities:
    # Nome da entidade raiz no GLPI (tickets desta entidade vão para o fallback)
    root-name: Entidade raiz

# IPs autorizados e tokens ficam no .env.
# Descomente para restringir por IP (recomendado em produção):
# security:
#   webhook:
#     allowed-ips:
#       - ${WEBHOOK_ALLOWED_IP_GLPI}
#       - ${WEBHOOK_ALLOWED_IP_TAIGA}
#     glpi-token: ${WEBHOOK_GLPI_TOKEN:}
#     taiga-secret: ${WEBHOOK_TAIGA_SECRET:}